# ============================================================
# MySQL Profile Configuration
# 使用: java -jar rasp-server.jar --spring.profiles.active=mysql
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/rasp_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=your_password_here

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
