# ============================================================
# RASP Server - Default Configuration (H2 in-memory)
# ============================================================
server.port=8080

# H2 Database (development/testing)
spring.datasource.url=jdbc:h2:mem:raspdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.rasp=INFO
logging.level.org.springframework=WARN

# ============================================================
# 切换数据库:
# 开发/测试: 默认 H2 (无需任何配置)
# MySQL:     spring.profiles.active=mysql
#            (然后在 application-mysql.properties 中配置连接)
# PostgreSQL: 同理，profile=postgres
# ============================================================
